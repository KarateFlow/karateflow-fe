services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "4200:4200"
    volumes:
      # Monta la cartella corrente nel container per il live-reload
      - .:/app
      # Usa un volume anonimo per i node_modules per evitare conflitti con la macchina host
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
