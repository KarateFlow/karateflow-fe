<div [formGroup]="formGroup()" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-12 gap-4 items-end p-4 bg-bg-canvas rounded-xl mb-3">
  <div class="sm:col-span-2 md:col-span-3">
    <app-ui-input
      [id]="'title-'+index()"
      type="text"
      formControlName="exerciseTitle"
      label="Esercizio"
      placeholder="Titolo"
      [invalid]="isInvalid('exerciseTitle')"
      errorMessage="Obbligatorio"
    ></app-ui-input>
  </div>
  
  <div class="md:col-span-2">
    <app-ui-input
      [id]="'result-'+index()"
      type="number"
      formControlName="result"
      label="Risultato"
      placeholder="0.00"
      [invalid]="isInvalid('result')"
      errorMessage="Valore non valido"
    ></app-ui-input>
  </div>
  
  <div class="md:col-span-2">
    <app-ui-select
      [id]="'unit-'+index()"
      formControlName="unit"
      label="Unità"
    >
      @for (unit of units; track unit) {
        <option [value]="unit">{{ unit }}</option>
      }
    </app-ui-select>
  </div>

  <div class="sm:col-span-2 md:col-span-3 flex flex-col gap-1.5 pb-2">
    <span class="text-xs font-bold uppercase tracking-wider text-text-muted">Tendenza</span>
    <div class="flex items-center gap-2">
      <input type="checkbox" formControlName="greaterIsBetter" [id]="'gib-'+index()" class="w-4 h-4 text-primary bg-surface border-border rounded focus:ring-primary focus:ring-2 accent-primary" />
      <label [for]="'gib-'+index()" class="text-sm cursor-pointer text-text-main font-medium select-none truncate">
        {{ formGroup().get('greaterIsBetter')?.value ? 'Alto è meglio' : 'Basso è meglio' }}
      </label>
    </div>
  </div>

  <div class="sm:col-span-2 md:col-span-2 flex items-center justify-end gap-2 pb-1">
    <app-ui-button variant="secondary" (btnClick)="duplicate.emit()" title="Duplica riga" class="flex-1 md:flex-none px-2 py-2">
      <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none">
        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
      </svg>
    </app-ui-button>
    <app-ui-button variant="danger" (btnClick)="remove.emit()" title="Rimuovi riga" class="flex-1 md:flex-none px-2 py-2">
      <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none">
        <polyline points="3 6 5 6 21 6"></polyline>
        <path d="M19 6v14a2 2 0 0 1-2-2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
      </svg>
    </app-ui-button>
  </div>
</div>
