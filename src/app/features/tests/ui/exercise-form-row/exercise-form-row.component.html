<div [formGroup]="formGroup()" class="exercise-row">
      <app-ui-input
        [id]="'title-'+index()"
        type="text"
        formControlName="exerciseTitle"
        label="Esercizio"
        placeholder="Titolo"
        [invalid]="isInvalid('exerciseTitle')"
        errorMessage="Obbligatorio"
      ></app-ui-input>
      
      <app-ui-input
        [id]="'result-'+index()"
        type="number"
        formControlName="result"
        label="Risultato"
        placeholder="0.00"
        [invalid]="isInvalid('result')"
        errorMessage="Valore non valido"
      ></app-ui-input>
      
      <app-ui-select
        [id]="'unit-'+index()"
        formControlName="unit"
        label="Unità"
      >
        @for (unit of units; track unit) {
          <option [value]="unit">{{ unit }}</option>
        }
      </app-ui-select>

      <div class="field toggle-field">
        <span class="label-span">Tendenza</span>
        <div class="toggle-container">
          <input type="checkbox" formControlName="greaterIsBetter" [id]="'gib-'+index()" />
          <label [for]="'gib-'+index()" class="toggle-label">
            {{ formGroup().get('greaterIsBetter')?.value ? 'Più è alto, meglio è' : 'Più è basso, meglio è' }}
          </label>
        </div>
      </div>

      <div class="actions">
        <app-ui-button variant="secondary" (onClick)="duplicate.emit()" title="Duplica riga">
          <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
        </app-ui-button>
        <app-ui-button variant="danger" (onClick)="remove.emit()" title="Rimuovi riga">
          <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          </svg>
        </app-ui-button>
      </div>
    </div>
