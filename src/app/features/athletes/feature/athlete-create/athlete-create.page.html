<div class="max-w-3xl mx-auto w-full py-6">
  <header class="mb-8">
    <h1 class="text-3xl font-extrabold text-text-main mb-2">Registrazione Nuovo Atleta</h1>
    <p class="text-lg text-text-muted">Inserisci i dati anagrafici e medici dell'atleta per inserirlo nel sistema.</p>
  </header>

  <section class="mb-8">
    <app-athlete-form [isSubmitting]="isSubmitting()" (save)="onSave($event)" />
  </section>

  <div class="flex justify-center mt-6">
    <button class="btn-base bg-transparent border border-border text-text-main hover:bg-hover disabled:opacity-50 disabled:cursor-not-allowed" (click)="goBack()" [disabled]="isSubmitting()">
      Annulla e Torna Indietro
    </button>
  </div>
</div>
