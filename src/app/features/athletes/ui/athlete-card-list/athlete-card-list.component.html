<div class="grid grid-cols-[repeat(auto-fill,minmax(280px,1fr))] gap-6 py-4">
  @for (athlete of athletes(); track athlete.athleteId) {
    <article 
      class="surface-card hover-item focus-ring p-6 flex flex-col gap-4 relative overflow-hidden transition-colors outline-none cursor-pointer group" 
      (click)="view.emit(athlete)"
      (keydown.enter)="view.emit(athlete)"
      (keydown.space)="view.emit(athlete)"
      role="button"
      tabindex="0"
    >
      <div class="flex justify-between items-start">
        <div class="w-16 h-16 rounded-full flex items-center justify-center border-2 border-surface bg-gradient-to-br from-surface-hover to-border shadow-sm">
          <span class="font-bold text-xl text-text-muted uppercase">{{ getInitials(athlete) }}</span>
        </div>
        <!-- Status badge could go here if needed -->
      </div>
      
      <div class="flex-1">
        <h3 class="text-lg font-bold text-text-main m-0">{{ athlete.firstName }} {{ athlete.lastName }}</h3>
        <div class="flex flex-col gap-1.5 mt-2">
          <div class="flex justify-between text-sm">
            <span class="text-text-muted">Nascita:</span>
            <span class="font-medium text-text-main">{{ athlete.birthDate | date }}</span>
          </div>
          <div class="flex justify-between text-sm">
            <span class="text-text-muted">Contatto:</span>
            <span class="font-medium text-text-main">{{ athlete.referenceContact || 'Non specificato' }}</span>
          </div>
        </div>
      </div>
      
      <div class="mt-auto pt-4 border-t border-border flex items-center justify-between text-text-muted group-hover:text-primary transition-colors">
        <span class="text-sm font-semibold">Vedi Profilo</span>
        <svg aria-hidden="true" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="transform group-hover:translate-x-1 transition-transform">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </div>
    </article>
  } @empty {
    <div class="col-span-full text-center p-16 bg-bg-canvas border-2 border-dashed rounded-xl text-text-muted">
      <p>Nessun atleta registrato nel sistema.</p>
    </div>
  }
</div>
