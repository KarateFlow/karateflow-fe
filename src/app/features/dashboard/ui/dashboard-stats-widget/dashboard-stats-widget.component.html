<div class="flex flex-col gap-3 py-4 border-b-2 border-border h-full transition-colors hover:border-primary group">
  <div class="flex items-center gap-2 text-text-muted">
    <div class="flex items-center justify-center opacity-70 group-hover:opacity-100 group-hover:text-primary transition-all" [ngClass]="iconBgClass.replace('bg-', 'text-').replace('bg-secondary', 'text-secondary')">
      <ng-content></ng-content>
    </div>
    <span class="text-xs font-bold uppercase tracking-wider">{{ title }}</span>
  </div>
  <div class="mt-2">
    <span class="text-6xl font-mono font-extrabold text-text-main leading-none tracking-tighter">{{ value }}</span>
  </div>
  <div class="mt-auto pt-2">
    @if (footerLink) {
      <a [routerLink]="footerLink" class="text-primary font-bold text-sm inline-flex items-center no-underline transition-colors hover:underline focus-ring">{{ footerText }} &rarr;</a>
    } @else if (footerText) {
      <span class="text-text-muted font-bold text-sm inline-flex items-center no-underline cursor-default opacity-60">{{ footerText }}</span>
    }
  </div>
</div>
