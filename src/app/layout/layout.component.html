<div class="flex h-screen w-full bg-bg-canvas text-text-main font-sans">
  
  <!-- Desktop Sidebar -->
  <app-sidebar [isMobile]="false"></app-sidebar>

  <!-- Mobile Wrapper & Main Content -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden relative">
    
    <!-- Mobile Header -->
    <app-header [isMobileMenuOpen]="isMobileMenuOpen()" (toggleMenu)="toggleMobileMenu()"></app-header>
    
    <!-- Mobile Sidebar -->
    @if (isMobileMenuOpen()) {
      <app-sidebar [isMobile]="true" (closeMenu)="closeMobileMenu()"></app-sidebar>
    }

    <!-- Main Content Area -->
    <main class="flex-1 overflow-y-auto p-4 md:p-6 bg-bg-canvas focus-ring" tabindex="-1" id="main-content">
      <div class="max-w-7xl mx-auto w-full flex flex-col gap-4 min-h-full">
        <app-breadcrumbs></app-breadcrumbs>
        <router-outlet></router-outlet>
      </div>
    </main>

  </div>
</div>
